<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Rehan Connect</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0d0d0d;
color:white;
overflow-x:hidden;
}

header{
width:100%;
padding:20px;
text-align:center;
font-size:32px;
font-weight:bold;
background:linear-gradient(90deg,#6a00ff,#9b00ff);
box-shadow:0 0 20px #7d00ff;
}

.hero{
padding:40px 20px;
text-align:center;
}

.hero h2{
font-size:34px;
margin-bottom:10px;
}

.hero p{
font-size:18px;
color:#bbb;
margin-bottom:30px;
}

.menu{
display:flex;
flex-direction:column;
align-items:center;
gap:18px;
padding-bottom:40px;
}

.btn{
width:90%;
max-width:350px;
padding:18px;
border:none;
border-radius:18px;
font-size:20px;
font-weight:bold;
color:white;
cursor:pointer;
transition:.3s;
box-shadow:0 0 15px rgba(255,255,255,.1);
}

.btn:hover{
transform:scale(1.05);
}
