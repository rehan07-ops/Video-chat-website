<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dating - Rehan Connect</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .profile-card {
            max-width: 420px;
            margin: 80px auto 20px;
            background: rgba(255,255,255,0.06);
            border-radius: 28px;
            overflow: hidden;
            border: 1px solid rgba(106,0,255,0.3);
        }
        .profile-card img {
            width: 100%;
            height: 480px;
            object-fit: cover;
        }
        .profile-info {
            padding: 25px;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo"><span style="font-size:28px">❤️</span> Rehan Connect Dating</div>
        <a href="video.html" class="btn primary" style="padding:10px 24px;">Video Chat</a>
    </header>

    <div class="profile-card glass">
        <img src="https://picsum.photos/id/1011/800/1000" alt="Profile">
        <div class="profile-info">
            <h2 style="margin-bottom:8px;">Emma • 23 • 🇫🇷</h2>
            <p style="color:#ccc;line-height:1.5;">Travel lover | Coffee addict | Looking for meaningful conversations ✨</p>
            
            <div style="display:flex;gap:15px;margin-top:35px;">
                <button onclick="nextProfile()" class="btn secondary" style="flex:1;padding:18px;font-size:1.1rem;">💔 Pass</button>
                <button onclick="likeProfile()" class="btn primary" style="flex:1;padding:18px;font-size:1.1rem;">❤️ Like</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        function nextProfile() {
            showToast("👀 Finding new profile...");
            setTimeout(() => location.reload(), 1200);
        }
        
        function likeProfile() {
            showToast("💘 It's a Match!");
        }
    </script>
</body>
</html>
