<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rehan Connect Dating</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0d0d0d;
color:white;
text-align:center;
}

header{
padding:18px;
font-size:28px;
font-weight:bold;
background:linear-gradient(90deg,#ff2d55,#ff6b81);
box-shadow:0 0 20px #ff2d55;
}

.card{
width:90%;
max-width:350px;
margin:30px auto;
background:#1c1c1c;
border-radius:20px;
overflow:hidden;
box-shadow:0 0 20px rgba(255,45,85,.4);
}

.photo{
height:350px;
background:#333;
display:flex;
align-items:center;
justify-content:center;
font-size:90px;
}

.info{
padding:20px;
}

.info h2{
margin-bottom:10px;
}
.info p{
color:#bbb;
margin-bottom:15px;
}

.actions{
display:flex;
justify-content:space-around;
padding:20px;
}

button{
width:120px;
padding:15px;
border:none;
border-radius:15px;
font-size:18px;
font-weight:bold;
color:white;
cursor:pointer;
transition:.3s;
}

.pass{
background:#666;
}

.like{
background:#ff2d55;
}

button:active{
transform:scale(.95);
}

footer{
padding:20px;
color:#888;
}

</style>
</head>

<body>

<header>❤️ Rehan Connect Dating</header>

<div class="card">

<div class="photo">
👩
</div>

<div class="info">

<h2>Sarah, 22</h2>

<p>📍 Hyderabad • Loves music, travel & coffee ☕</p>

</div>

<div class="actions">

<button class="pass">❌ Pass</button>

<button class="like">❤️ Like</button>

</div>

</div>

<footer>
Find your perfect match 💜
</footer>
<script>

const profiles = [

{
name:"Sarah",
age:22,
city:"Hyderabad",
emoji:"👩"
},

{
name:"Aisha",
age:21,
city:"Mumbai",
emoji:"👩‍🦰"
},

{
name:"Emma",
age:24,
city:"London",
emoji:"👱‍♀️"
},

{
name:"Sofia",
age:23,
city:"Dubai",
emoji:"👩"
}

];

let current = 0;

const photo = document.querySelector(".photo");
const title = document.querySelector(".info h2");
const info = document.querySelector(".info p");

function loadProfile(){

const p = profiles[current];

photo.textContent = p.emoji;
title.textContent = p.name + ", " + p.age;
info.textContent = "📍 " + p.city;

}

document.querySelector(".pass").onclick = nextProfile;
document.querySelector(".like").onclick = nextProfile;

function nextProfile(){

current++;

if(current >= profiles.length){
current = 0;
}

loadProfile();

}

loadProfile();

</script>
</body>
</html>
