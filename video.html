<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rehan Connect - Video Chat</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#090909;
color:white;
text-align:center;
}
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:18px;
background:linear-gradient(90deg,#6a00ff,#9b00ff);
font-size:24px;
font-weight:bold;
box-shadow:0 0 20px #8f00ff;
}

.settings{
font-size:28px;
cursor:pointer;
}

#settingsMenu{
display:none;
background:#1b1b1b;
text-align:left;
padding:15px;
border-bottom:2px solid #7d00ff;
}

#settingsMenu div{
padding:12px;
border-bottom:1px solid #333;
}

.status{
margin-top:15px;
font-size:18px;
font-weight:bold;
color:#00ff88;
}

.live{
margin-top:8px;
color:red;
font-weight:bold;
}

.videoBox{
width:95%;
height:60vh;
margin:20px auto;
background:black;
border-radius:20px;
border:3px solid #7d00ff;
object-fit:cover;
}

.controls{
display:flex;
justify-content:center;
gap:12px;
flex-wrap:wrap;
margin-top:20px;
}

.btn{
padding:15px 18px;
border:none;
border-radius:12px;
font-size:17px;
color:white;
cursor:pointer;
}

.find{background:#00c853;}
.next{background:#ff9800;}
.end{background:#f44336;}

.bottom{
display:flex;
justify-content:center;
gap:20px;
margin:25px;
}

.icon{
background:#222;
padding:15px;
border-radius:50%;
border:2px solid #7d00ff;
font-size:28px;
cursor:pointer;
}
</style>

</head>

<body>
<header>

<span>🎥 Rehan Connect</span>

<div class="settings">⚙️</div>

</header>

<div id="settingsMenu" style="display:none;">

<div>👤 Profile</div>

<div>🌍 Country Filter</div>

<div>🌐 Language</div>

<div>🌙 Dark Mode</div>

<div>🔔 Notifications</div>

<div>🚪 Logout</div>

</div>

<div class="status">

🟢 Waiting for a stranger...

</div>

<div class="live">

🔴 LIVE

</div>
<video
id="localVideo"
autoplay
playsinline
muted
class="videoBox">
</video>

<div class="controls">

<button class="btn find">
🎲 Find Stranger
</button>

<button class="btn next">
⏭ Next
</button>

<button class="btn end">
❌ End Chat
</button>

</div>

<div class="bottom">

<div class="icon mic">🎤</div>

<div class="icon camera">📷</div>

<div class="icon flip">🔄</div>

</div>


<script>

let stream = null;

document.querySelector(".find").onclick = async function(){

try{

stream = await navigator.mediaDevices.getUserMedia({
video:true,
audio:true
});

document.getElementById("localVideo").srcObject = stream;

document.querySelector(".status").innerHTML =
"🟢 Camera Connected";

}catch(e){

alert("Camera permission denied!");

}

};

document.querySelector(".next").onclick = function(){

alert("Searching for another stranger...");

};

document.querySelector(".end").onclick = function(){

if(stream){

stream.getTracks().forEach(track=>track.stop());

}

window.location.href="index.html";

};

document.querySelector(".settings").onclick = function(){

const menu = document.getElementById("settingsMenu");

menu.style.display =
menu.style.display=="block" ? "none" : "block";

};

</script>

</body>
</html>
