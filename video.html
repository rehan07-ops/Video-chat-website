<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Random Video Chat</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#090909;
color:white;
text-align:center;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:18px;
font-size:24px;
font-weight:bold;
background:linear-gradient(90deg,#6a00ff,#9b00ff);
box-shadow:0 0 20px #8f00ff;
}

.settings{
font-size:30px;
cursor:pointer;
}

.status{
margin-top:15px;
font-size:18px;
color:#00ff88;
font-weight:bold;
}

.videoBox{
width:92%;
height:300px;
margin:20px auto;
border-radius:20px;
background:#1b1b1b;
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
border:3px solid #7d00ff;
box-shadow:0 0 20px #7d00ff;
}

.controls{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:15px;
margin-top:20px;
}
.btn{
width:160px;
padding:15px;
border:none;
border-radius:15px;
font-size:18px;
font-weight:bold;
color:white;
cursor:pointer;
transition:.3s;
}

.find{
background:#00c853;
}

.next{
background:#ff9800;
}

.end{
background:#f44336;
}

.btn:active{
transform:scale(.95);
}

.bottom{
margin-top:25px;
display:flex;
justify-content:center;
gap:20px;
font-size:32px;
}

.icon{
background:#222;
padding:15px;
border-radius:50%;
border:2px solid #7d00ff;
}

footer{
margin-top:30px;
padding:20px;
color:#888;
}

</style>
</head>

<body>

<header class="topBar">

<span>🎥 Random Video Chat</span>

<div class="settings">⚙️</div>

</header>
<div id="settingsMenu" style="
display:none;
background:#1c1c1c;
padding:15px;
border-bottom:2px solid #7d00ff;
text-align:left;
">

<div style="padding:10px;">👤 Profile</div>

<div style="padding:10px;">🌍 Country Filter</div>

<div style="padding:10px;">🌐 Language</div>

<div style="padding:10px;">🌙 Dark Mode</div>

<div style="padding:10px;">🔔 Notifications</div>

<div style="padding:10px;">🚪 Logout</div>

</div>
<div class="status">
🟢 Waiting for a stranger...
</div>
<div style="color:red;font-weight:bold;margin:10px;">
🔴 LIVE
</div>
<video
id="localVideo"
autoplay
playsinline
muted
class="videoBox">
</video>

<div class="controls">
  <button class="btn find">🎲 Find Stranger</button>

<button class="btn next">⏭ Next</button>

<button class="btn end">❌ End Chat</button>

</div>

<div class="bottom">

<div class="icon mic">🎤</div>

<div class="icon camera">📷</div>

<div class="icon">🌍</div>

<div class="icon">⚙️</div>
<script>

let stream = null;

document.querySelector(".find").onclick = async function () {

try {

stream = await navigator.mediaDevices.getUserMedia({
video:true,
audio:true
});

document.getElementById("localVideo").srcObject = stream;

document.querySelector(".status").innerHTML =
"🟢 Camera Connected";

} catch(e) {

alert("Camera permission denied.");

}

};

document.querySelector(".next").onclick = function(){

alert("Searching for another stranger...");

};

document.querySelector(".end").onclick = function(){

if(stream){

stream.getTracks().forEach(track => track.stop());

}

window.location.href="index.html";

};
document.querySelector(".mic").onclick = function(){

if(!stream) return;

const audioTrack = stream.getAudioTracks()[0];

audioTrack.enabled = !audioTrack.enabled;

this.innerHTML = audioTrack.enabled ? "🎤" : "🔇";

};

document.querySelector(".camera").onclick = function(){

if(!stream) return;

const videoTrack = stream.getVideoTracks()[0];

videoTrack.enabled = !videoTrack.enabled;

this.innerHTML = videoTrack.enabled ? "📷" : "🚫";

};
document.querySelector(".settings").onclick = function(){

const menu = document.getElementById("settingsMenu");

if(menu.style.display === "none"){

menu.style.display = "block";

}else{

menu.style.display = "none";

}

};
</script>

</body>
</html>
