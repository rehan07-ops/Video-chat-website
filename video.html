<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rehan Connect</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .video-wrapper {
            height: 100vh;
            position: relative;
            background: #000;
            overflow: hidden;
        }
        #localVideo {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .live-badge {
            position: absolute;
            top: 85px;
            left: 20px;
            background: rgba(0,0,0,0.75);
            color: white;
            padding: 8px 20px;
            border-radius: 30px;
            font-size: 15px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            z-index: 100;
            border: 1px solid rgba(255,0,51,0.4);
        }
        .online-counter {
            position: absolute;
            top: 85px;
            right: 20px;
            background: rgba(0,0,0,0.75);
            color: #00ff9d;
            padding: 8px 18px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 600;
            z-index: 100;
            border: 1px solid rgba(0,255,157,0.3);
        }
        .bottom-controls {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(15, 15, 30, 0.96);
            backdrop-filter: blur(30px);
            border-radius: 30px;
            padding: 18px 25px;
            display: flex;
            gap: 22px;
            z-index: 2000;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            border: 1px solid rgba(106,0,255,0.4);
        }
        .ctrl-btn {
            width: 58px;
            height: 58px;
            border-radius: 50%;
            background: rgba(106, 0, 255, 0.18);
            border: 3px solid #9b00ff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .ctrl-btn:active {
            transform: scale(0.88);
        }
        .ctrl-btn.muted {
            background: #ff3366;
            border-color: #ff8899;
        }
        .ctrl-btn.recording {
            background: #ff0033;
            border-color: #ff6666;
            animation: pulse 1.5s infinite;
        }
        .ctrl-btn.end {
            background: #ff0033;
            border-color: #ff6666;
        }
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(255, 0, 51, 0.7); }
            70% { box-shadow: 0 0 0 12px rgba(255, 0, 51, 0); }
        }
        @keyframes livePulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="logo">
            <span style="font-size:28px">🎥</span>
            Rehan Connect
        </div>
        <div onclick="toggleSettingsModal()" style="width:50px;height:50px;background:rgba(106,0,255,0.2);border:2px solid #9b00ff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:26px;cursor:pointer;">
            ⚙️
        </div>
    </header>

    <!-- Video Area -->
    <div class="video-wrapper">
        <video id="localVideo" autoplay playsinline></video>
        
        <!-- LIVE Status -->
        <div class="live-badge" id="liveBadge">
            <span style="display:inline-block;width:10px;height:10px;background:#ff0033;border-radius:50%;animation:livePulse 1.5s infinite;"></span>
            LIVE • Connected
        </div>

        <!-- Online Users -->
        <div class="online-counter" id="onlineCounter">
            🔥 <span id="onlineCount">1,428,739</span> online
        </div>

        <!-- Loading -->
        <div id="loading" style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#9b00ff;font-size:18px;text-align:center;display:none;z-index:10;">
            <div style="font-size:70px;margin-bottom:12px;animation:spin 2s linear infinite;">📹</div>
            Starting Camera...
        </div>
    </div>

    <!-- Bottom Controls -->
    <div class="bottom-controls">
        <div class="ctrl-btn" id="micBtn" onclick="toggleMic()">🎤</div>
        <div class="ctrl-btn" id="cameraBtn" onclick="toggleCameraAndFlip()">📷</div>
        <div class="ctrl-btn" onclick="capturePhoto()">📸</div>
        <div class="ctrl-btn" id="recordBtn" onclick="toggleRecording()">🎥</div>
        <div class="ctrl-btn end" onclick="endSession()">✕</div>
    </div>

    <!-- Settings Modal -->
    <div class="modal" id="settingsModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);backdrop-filter:blur(20px);align-items:center;justify-content:center;z-index:3000;">
        <div class="modal-content" style="background:rgba(20,20,35,0.98);width:90%;max-width:380px;border-radius:24px;overflow:hidden;border:1px solid rgba(106,0,255,0.5);">
            <div class="modal-header" style="padding:20px;border-bottom:1px solid rgba(106,0,255,0.3);display:flex;justify-content:space-between;align-items:center;">
                <h2 style="margin:0;">Settings</h2>
                <span onclick="toggleSettingsModal()" style="font-size:32px;cursor:pointer;color:#aaa;">×</span>
            </div>
            <div class="modal-body" style="padding:15px;max-height:70vh;overflow-y:auto;">
                <div class="option" onclick="toggleCameraAndFlip()" style="padding:16px 20px;margin:6px 0;border-radius:16px;background:rgba(255,255,255,0.06);cursor:pointer;display:flex;justify-content:space-between;align-items:center;">
                    <span>📷 Camera</span>
                    <span id="camMode">Front</span>
                </div>
                <div class="option" onclick="toggleMic()" style="padding:16px 20px;margin:6px 0;border-radius:16px;background:rgba(255,255,255,0.06);cursor:pointer;display:flex;justify-content:space-between;align-items:center;">
                    <span>🎤 Microphone</span>
                    <span id="micStatus">ON</span>
                </div>
                <div class="option" onclick="capturePhoto()" style="padding:16px 20px;margin:6px 0;border-radius:16px;background:rgba(255,255,255,0.06);cursor:pointer;">📸 Capture Photo</div>
                <div class="option" onclick="toggleRecording()" style="padding:16px 20px;margin:6px 0;border-radius:16px;background:rgba(255,255,255,0.06);cursor:pointer;">🎥 Record Video</div>
                <div class="option" onclick="toggleFullscreen()" style="padding:16px 20px;margin:6px 0;border-radius:16px;background:rgba(255,255,255,0.06);cursor:pointer;">⛶ Fullscreen</div>
                <div onclick="logout()" class="option" style="padding:16px 20px;margin:20px 0 6px;border-radius:16px;background:rgba(255,80,80,0.15);color:#ff6666;cursor:pointer;">🚪 Logout</div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        let stream = null;
        let currentFacingMode = 'user';
        let isMicEnabled = true;
        let isRecording = false;
        let mediaRecorder = null;
        let recordedChunks = [];
        let photoCanvas = document.createElement('canvas');

        async function initCamera(facing = 'user') {
            document.getElementById('loading').style.display = 'block';
            try {
                if (stream) stream.getTracks().forEach(t => t.stop());
                
                stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: facing, width: { ideal: 1280 }, height: { ideal: 720 } },
                    audio: true
                });
                
                const videoEl = document.getElementById('localVideo');
                videoEl.srcObject = stream;
                currentFacingMode = facing;
                videoEl.style.transform = facing === 'user' ? 'scaleX(-1)' : 'scaleX(1)';
                
                document.getElementById('loading').style.display = 'none';
                document.getElementById('camMode').textContent = facing === 'user' ? 'Front' : 'Back';
            } catch(e) {
                document.getElementById('loading').style.display = 'none';
                alert("❌ Camera access denied or not available.");
            }
        }

        function toggleMic() {
            if (!stream) return;
            isMicEnabled = !isMicEnabled;
            stream.getAudioTracks()[0].enabled = isMicEnabled;
            const micBtn = document.getElementById('micBtn');
            micBtn.textContent = isMicEnabled ? '🎤' : '🔇';
            micBtn.classList.toggle('muted', !isMicEnabled);
            document.getElementById('micStatus').textContent = isMicEnabled ? 'ON' : 'OFF';
        }

        function toggleCameraAndFlip() {
            const nextMode = currentFacingMode === 'user' ? 'environment' : 'user';
            initCamera(nextMode);
        }

        function capturePhoto() {
            if (!stream) return;
            const video = document.getElementById('localVideo');
            photoCanvas.width = video.videoWidth || 1280;
            photoCanvas.height = video.videoHeight || 720;
            photoCanvas.getContext('2d').drawImage(video, 0, 0);
            const link = document.createElement('a');
            link.download = `rehan-connect-${Date.now()}.png`;
            link.href = photoCanvas.toDataURL('image/png');
            link.click();
        }

        function toggleRecording() {
            if (!stream) return;
            const btn = document.getElementById('recordBtn');
            if (!isRecording) {
                recordedChunks = [];
                mediaRecorder = new MediaRecorder(stream);
                mediaRecorder.ondataavailable = e => recordedChunks.push(e.data);
                mediaRecorder.onstop = () => {
                    const blob = new Blob(recordedChunks, { type: 'video/mp4' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `rehan-recording-${Date.now()}.mp4`;
                    a.click();
                };
                mediaRecorder.start();
                isRecording = true;
                btn.classList.add('recording');
            } else {
                mediaRecorder.stop();
                isRecording = false;
                btn.classList.remove('recording');
            }
        }

        function endSession() {
            if (confirm("End current session?")) {
                if (stream) stream.getTracks().forEach(t => t.stop());
                window.location.href = "index.html";
            }
        }

        function toggleSettingsModal() {
            const modal = document.getElementById('settingsModal');
            modal.style.display = modal.style.display === 'flex' ? 'none' : 'flex';
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) document.documentElement.requestFullscreen();
            else document.exitFullscreen();
            toggleSettingsModal();
        }

        function logout() {
            if (confirm("Logout from Rehan Connect?")) {
                if (stream) stream.getTracks().forEach(t => t.stop());
                window.location.href = "index.html";
            }
        }

        // Live Online Counter (Fake Dynamic)
        function updateOnlineCount() {
            let count = 1428739;
            setInterval(() => {
                count += Math.floor(Math.random() * 300) + 50;
                document.getElementById('onlineCount').textContent = count.toLocaleString('en-US');
            }, 4500);
        }

        // Initialize
        window.onload = () => {
            initCamera('user');
            updateOnlineCount();
        };
    </script>
</body>
                                             </html>
