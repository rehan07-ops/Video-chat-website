<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rehan Connect - Video Chat</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Space+Grotesk:wght@500;600&amp;display=swap');
        
        :root {
            --primary: #6a00ff;
            --primary-light: #9b00ff;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', system_ui, sans-serif;
            background: linear-gradient(135deg, #0a0a0a, #1a0033);
            color: #ffffff;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }
        
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 70px;
            background: rgba(15, 15, 25, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(106, 0, 255, 0.2);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 1000;
        }
        
        .logo {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 24px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
            color: white;
        }
        
        .settings-btn {
            width: 45px;
            height: 45px;
            background: rgba(106, 0, 255, 0.15);
            border: 2px solid rgba(155, 0, 255, 0.4);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .settings-btn:hover {
            background: rgba(106, 0, 255, 0.3);
            transform: rotate(30deg);
        }
        
        .settings-panel {
            position: fixed;
            top: 70px;
            right: -320px;
            width: 300px;
            height: calc(100vh - 70px);
            background: rgba(20, 20, 35, 0.98);
            backdrop-filter: blur(30px);
            border-left: 1px solid rgba(106, 0, 255, 0.3);
            border-radius: 20px 0 0 20px;
            padding: 25px;
            transition: right 0.4s cubic-bezier(0.32, 0.72, 0, 1);
            z-index: 1100;
            overflow-y: auto;
        }
        
        .settings-panel.open {
            right: 0;
        }
        
        .menu-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 16px 20px;
            margin-bottom: 8px;
            border-radius: 16px;
            background: rgba(255,255,255,0.05);
            transition: all 0.2s ease;
            cursor: pointer;
        }
        
        .menu-item:hover {
            background: rgba(106, 0, 255, 0.2);
            transform: translateX(8px);
        }
        
        .main-content {
            padding-top: 70px;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .video-container {
            position: relative;
            flex: 1;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            margin: 10px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
        }
        
        #localVideo {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 24px;
            transform: scaleX(-1);
        }
        
        .video-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
            pointer-events: none;
        }
        
        .status-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .status {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            padding: 8px 18px;
            border-radius: 50px;
            font-size: 15px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
            border: 1px solid rgba(106, 0, 255, 0.3);
        }
        
        .live-indicator {
            background: #ff0033;
            color: white;
            font-size: 13px;
            font-weight: 700;
            padding: 4px 12px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 6px;
            animation: pulse 2s infinite;
            box-shadow: 0 0 15px #ff0033;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        
        .action-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            padding: 20px;
            flex-wrap: wrap;
        }
        
        .btn {
            padding: 14px 32px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0.0, 0.2, 1);
            border: none;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }
        
        .btn-primary {
            background: linear-gradient(90deg, var(--primary), var(--primary-light));
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(106, 0, 255, 0.4);
        }
        
        .btn-secondary {
            background: rgba(255,255,255,0.1);
            color: white;
            border: 2px solid rgba(255,255,255,0.2);
        }
        
        .btn-danger {
            background: #ff0033;
            color: white;
        }
        
        .bottom-controls {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(15, 15, 25, 0.95);
            backdrop-filter: blur(30px);
            border-radius: 60px;
            padding: 12px 20px;
            display: flex;
            gap: 25px;
            border: 1px solid rgba(106, 0, 255, 0.3);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            z-index: 1000;
        }
        
        .control-btn {
            width: 60px;
            height: 60px;
            background: rgba(106, 0, 255, 0.15);
            border: 3px solid rgba(155, 0, 255, 0.5);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .control-btn:active {
            transform: scale(0.9);
        }
        
        .control-btn.muted {
            background: #ff0033;
            border-color: #ff6666;
        }
        
        .glass {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(20px);
        }
        
        .no-video {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: #888;
            z-index: 10;
            pointer-events: none;
        }
        
        .neon-text {
            text-shadow: 0 0 20px var(--primary);
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="logo">
            <span style="font-size: 28px;">🎥</span>
            <span>Rehan Connect</span>
        </div>
        <div onclick="toggleSettings()" class="settings-btn" id="settingsIcon">
            ⚙️
        </div>
    </header>

    <!-- Settings Panel -->
    <div class="settings-panel" id="settingsPanel">
        <h2 style="margin-bottom: 25px; color: #ddd; font-size: 22px;">Settings</h2>
        
        <div class="menu-item" onclick="showProfile()">
            <span style="font-size: 24px;">👤</span>
            <div>
                <div style="font-weight: 600;">Profile</div>
                <div style="font-size: 13px; color: #aaa;">Edit your profile</div>
            </div>
        </div>
        
        <div class="menu-item" onclick="showCountryFilter()">
            <span style="font-size: 24px;">🌍</span>
            <div>
                <div style="font-weight: 600;">Country Filter</div>
                <div style="font-size: 13px; color: #aaa;">Choose preferred countries</div>
            </div>
        </div>
        
        <div class="menu-item" onclick="showLanguage()">
            <span style="font-size: 24px;">🌐</span>
            <div>
                <div style="font-weight: 600;">Language</div>
                <div style="font-size: 13px; color: #aaa;">English (US)</div>
            </div>
        </div>
        
        <div class="menu-item" onclick="toggleDarkMode()">
            <span style="font-size: 24px;">🌙</span>
            <div>
                <div style="font-weight: 600;">Dark Mode</div>
                <div style="font-size: 13px; color: #aaa;">Enabled</div>
            </div>
        </div>
        
        <div class="menu-item" onclick="showNotifications()">
            <span style="font-size: 24px;">🔔</span>
            <div>
                <div style="font-weight: 600;">Notifications</div>
                <div style="font-size: 13px; color: #aaa;">Manage alerts</div>
            </div>
        </div>
        
        <div onclick="logout()" class="menu-item" style="margin-top: 30px; background: rgba(255, 50, 50, 0.15);">
            <span style="font-size: 24px;">🚪</span>
            <div>
                <div style="font-weight: 600; color: #ff6666;">Logout</div>
            </div>
        </div>
    </div>

    <div class="main-content">
        <!-- Video Container -->
        <div class="video-container" id="videoContainer">
            <video id="localVideo" autoplay playsinline></video>
            
            <!-- No video placeholder -->
            <div class="no-video" id="noVideoPlaceholder">
                <div style="font-size: 80px; margin-bottom: 20px; opacity: 0.6;">📹</div>
                <div style="font-size: 18px; margin-bottom: 8px;">Camera is off</div>
                <div style="font-size: 14px;">Tap "Find Stranger" to start</div>
            </div>
            
            <!-- Video Overlay -->
            <div class="video-overlay">
                <!-- Top Status -->
                <div class="status-bar">
                    <div class="status" id="statusText">
                        <span id="statusDot" style="display: inline-block; width: 10px; height: 10px; background: #22ff88; border-radius: 50%;"></span>
                        <span id="statusMessage">Waiting for a stranger...</span>
                    </div>
                    
                    <div class="live-indicator" id="liveIndicator" style="display: none;">
                        <span style="display: inline-block; width: 8px; height: 8px; background: white; border-radius: 50%; animation: pulse 1s infinite;"></span>
                        LIVE
                    </div>
                </div>
                
                <!-- Bottom Info -->
                <div style="text-align: center; pointer-events: auto;">
                    <div onclick="findStranger()" id="findBtnOverlay" 
                         style="background: rgba(106, 0, 255, 0.9); color: white; padding: 12px 40px; border-radius: 50px; font-weight: 600; display: inline-flex; align-items: center; gap: 10px; box-shadow: 0 10px 30px rgba(106, 0, 255, 0.5); cursor: pointer;">
                        🎲 Find Stranger
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Action Buttons -->
        <div class="action-buttons">
            <button onclick="findStranger()" id="findBtn" class="btn btn-primary">
                🎲 Find Stranger
            </button>
            
            <button onclick="nextStranger()" id="nextBtn" class="btn btn-secondary" style="display: none;">
                ⏭ Next
            </button>
            
            <button onclick="endChat()" id="endBtn" class="btn btn-danger" style="display: none;">
                ❌ End Chat
            </button>
        </div>
    </div>
    
    <!-- Bottom Controls -->
    <div class="bottom-controls" id="bottomControls" style="display: none;">
        <div onclick="toggleMicrophone()" id="micBtn" class="control-btn">🎤</div>
        <div onclick="toggleCamera()" id="camBtn" class="control-btn">📷</div>
        <div onclick="flipCamera()" id="flipBtn" class="control-btn">🔄</div>
    </div>

    <script>
        // DOM Elements
        let localVideo = document.getElementById('localVideo');
        let statusMessage = document.getElementById('statusMessage');
        let statusDot = document.getElementById('statusDot');
        let liveIndicator = document.getElementById('liveIndicator');
        let findBtn = document.getElementById('findBtn');
        let nextBtn = document.getElementById('nextBtn');
        let endBtn = document.getElementById('endBtn');
        let bottomControls = document.getElementById('bottomControls');
        let noVideoPlaceholder = document.getElementById('noVideoPlaceholder');
        let settingsPanel = document.getElementById('settingsPanel');
        
        // State
        let localStream = null;
        let isCameraOn = true;
        let isMicOn = true;
        let currentFacingMode = 'user'; // 'user' or 'environment'
        let isConnected = false;
        
        // Request camera and microphone
        async function startCamera(facingMode = 'user') {
            try {
                if (localStream) {
                    localStream.getTracks().forEach(track => track.stop());
                }
                
                const constraints = {
                    video: {
                        facingMode: facingMode,
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    },
                    audio: true
                };
                
                localStream = await navigator.mediaDevices.getUserMedia(constraints);
                
                localVideo.srcObject = localStream;
                currentFacingMode = facingMode;
                
                // Show video and controls
                noVideoPlaceholder.style.display = 'none';
                bottomControls.style.display = 'flex';
                liveIndicator.style.display = 'flex';
                
                // Update status
                statusMessage.textContent = 'Camera Connected';
                statusDot.style.background = '#22ff88';
                
                isCameraOn = true;
                isMicOn = true;
                
                // Enable action buttons
                findBtn.style.display = 'none';
                nextBtn.style.display = 'inline-flex';
                endBtn.style.display = 'inline-flex';
                
                isConnected = true;
                
            } catch (err) {
                console.error('Error accessing media devices:', err);
                alert('Could not access camera or microphone. Please allow permissions and try again.');
            }
        }
        
        function toggleMicrophone() {
            if (!localStream) return;
            
            isMicOn = !isMicOn;
            const audioTrack = localStream.getAudioTracks()[0];
            
            if (audioTrack) {
                audioTrack.enabled = isMicOn;
            }
            
            const micBtn = document.getElementById('micBtn');
            micBtn.textContent = isMicOn ? '🎤' : '🔇';
            micBtn.classList.toggle('muted', !isMicOn);
        }
        
        function toggleCamera() {
            if (!localStream) return;
            
            isCameraOn = !isCameraOn;
            const videoTrack = localStream.getVideoTracks()[0];
            
            if (videoTrack) {
                videoTrack.enabled = isCameraOn;
            }
            
            const camBtn = document.getElementById('camBtn');
            camBtn.textContent = isCameraOn ? '📷' : '🚫';
            
            if (!isCameraOn) {
                noVideoPlaceholder.style.display = 'block';
            } else {
                noVideoPlaceholder.style.display = 'none';
            }
        }
        
        async function flipCamera() {
            if (!localStream) return;
            
            // Switch between front and back
            const newFacingMode = currentFacingMode === 'user' ? 'environment' : 'user';
            
            try {
                const constraints = {
                    video: {
                        facingMode: newFacingMode,
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    },
                    audio: true
                };
                
                const newStream = await navigator.mediaDevices.getUserMedia(constraints);
                
                // Stop old tracks
                localStream.getTracks().forEach(track => track.stop());
                
                // Replace stream
                localStream = newStream;
                localVideo.srcObject = localStream;
                currentFacingMode = newFacingMode;
                
            } catch (err) {
                console.error('Error flipping camera:', err);
                alert('Could not switch camera. Your device may not support this.');
            }
        }
        
        function findStranger() {
            startCamera('user');
        }
        
        function nextStranger() {
            // Simulate next stranger search
            statusMessage.textContent = 'Searching for another stranger...';
            statusDot.style.background = '#ffaa00';
            
            // In real app, this would disconnect WebRTC peer and start new one
            setTimeout(() => {
                statusMessage.textContent = 'Connected to new stranger!';
                statusDot.style.background = '#22ff88';
            }, 1800);
        }
        
        function endChat() {
            if (localStream) {
                localStream.getTracks().forEach(track => track.stop());
            }
            localVideo.srcObject = null;
            localStream = null;
            
            // Reset UI
            noVideoPlaceholder.style.display = 'block';
            bottomControls.style.display = 'none';
            liveIndicator.style.display = 'none';
            
            statusMessage.textContent = 'Waiting for a stranger...';
            statusDot.style.background = '#22ff88';
            
            findBtn.style.display = 'inline-flex';
            nextBtn.style.display = 'none';
            endBtn.style.display = 'none';
            
            isConnected = false;
            
            // Redirect to index.html as requested
            window.location.href = 'index.html';
        }
        
        // Settings
        function toggleSettings() {
            settingsPanel.classList.toggle('open');
        }
        
        function showProfile() {
            alert("👤 Profile page would open here.\n\n(Placeholder for future profile management)");
            toggleSettings();
        }
        
        function showCountryFilter() {
            alert("🌍 Country filter options coming soon!\n\nYou will be able to select preferred countries.");
            toggleSettings();
        }
        
        function showLanguage() {
            alert("🌐 Language selection coming soon.");
            toggleSettings();
        }
        
        function toggleDarkMode() {
            alert("🌙 You are already in dark mode!\n\nTheme switching will be available in future updates.");
            toggleSettings();
        }
        
        function showNotifications() {
            alert("🔔 Notifications settings coming soon.");
            toggleSettings();
        }
        
        function logout() {
            if (confirm("Logout from Rehan Connect?")) {
                if (localStream) {
                    localStream.getTracks().forEach(track => track.stop());
                }
                window.location.href = 'index.html';
            }
        }
        
        // Keyboard shortcuts
        function handleKeyPress(e) {
            if (e.key === "Escape" && settingsPanel.classList.contains('open')) {
                settingsPanel.classList.remove('open');
            }
        }
        
        // Touch support for mobile
        function initMobileOptimizations() {
            // Prevent zoom on double tap
            document.addEventListener('touchend', function(e) {
                if (e.touches && e.touches.length > 1) {
                    e.preventDefault();
                }
            }, { passive: false });
        }
        
        // Initialize everything
        function initialize() {
            // Video mirror fix for front camera
            localVideo.style.transform = 'scaleX(-1)';
            
            // Close settings when tapping outside
            document.addEventListener('click', function(e) {
                if (settingsPanel.classList.contains('open') && 
                    !settingsPanel.contains(e.target) && 
                    e.target.id !== 'settingsIcon') {
                    settingsPanel.classList.remove('open');
                }
            });
            
            // Keyboard listener
            document.addEventListener('keydown', handleKeyPress);
            
            // Mobile optimizations
            initMobileOptimizations();
            
            // Show initial state
            console.log('%cRehan Connect Video Chat initialized successfully ✅', 'color: #9b00ff; font-size: 14px;');
            
            // Auto request permission on load? No, wait for user to click "Find Stranger"
        }
        
        // Make functions available globally
        window.toggleSettings = toggleSettings;
        window.findStranger = findStranger;
        window.nextStranger = nextStranger;
        window.endChat = endChat;
        window.toggleMicrophone = toggleMicrophone;
        window.toggleCamera = toggleCamera;
        window.flipCamera = flipCamera;
        window.showProfile = showProfile;
        window.showCountryFilter = showCountryFilter;
        window.showLanguage = showLanguage;
        window.toggleDarkMode = toggleDarkMode;
        window.showNotifications = showNotifications;
        window.logout = logout;
        
        // Start initialization
        window.onload = initialize;
    </script>
</body>
  </html>
