<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rehan Connect</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Space+Grotesk:wght@500;600&amp;display=swap');
        
        :root {
            --primary: #6a00ff;
            --primary-light: #9b00ff;
            --accent: #00ff9d;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: #0a0a0a;
            color: #fff;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }
        
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 65px;
            background: rgba(10, 10, 20, 0.95);
            backdrop-filter: blur(20px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 2000;
            border-bottom: 1px solid rgba(106, 0, 255, 0.2);
        }
        
        .logo {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 26px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .settings-btn {
            width: 48px;
            height: 48px;
            background: rgba(106, 0, 255, 0.15);
            border: 2px solid var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .settings-btn:active {
            transform: scale(0.9) rotate(20deg);
        }
        
        .video-wrapper {
            height: 100vh;
            position: relative;
            background: #000;
        }
        
        #localVideo {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }
        
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 80px 20px 120px;
            pointer-events: none;
            z-index: 10;
        }
        
        .top-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .status {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(12px);
            padding: 8px 20px;
            border-radius: 50px;
            font-size: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            border: 1px solid rgba(106, 0, 255, 0.4);
        }
        
        .live-dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            background: #ff0033;
            border-radius: 50%;
            animation: livePulse 1.5s infinite;
        }
        
        @keyframes livePulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        
        .bottom-bar {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(15, 15, 30, 0.95);
            backdrop-filter: blur(30px);
            border-radius: 60px;
            padding: 12px 18px;
            display: flex;
            gap: 14px;
            z-index: 2000;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(106, 0, 255, 0.3);
        }
        
        .ctrl-btn {
            width: 58px;
            height: 58px;
            border-radius: 50%;
            background: rgba(106, 0, 255, 0.12);
            border: 3px solid rgba(155, 0, 255, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            color: white;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
        }
        
        .ctrl-btn:active {
            transform: scale(0.85);
            background: rgba(106, 0, 255, 0.3);
        }
        
        .ctrl-btn.danger {
            background: rgba(255, 30, 60, 0.9);
            border-color: #ff6666;
        }
        
        .ctrl-btn.muted {
            background: #ff3366;
            border-color: #ff99aa;
        }
        
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(20px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 3000;
        }
        
        .modal-content {
            background: rgba(20, 20, 35, 0.98);
            width: 90%;
            max-width: 380px;
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid rgba(106, 0, 255, 0.5);
        }
        
        .modal-header {
            padding: 20px;
            border-bottom: 1px solid rgba(106, 0, 255, 0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .modal-body {
            padding: 15px;
            max-height: 70vh;
            overflow-y: auto;
        }
        
        .option {
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-radius: 16px;
            margin-bottom: 8px;
            background: rgba(255,255,255,0.05);
            cursor: pointer;
        }
        
        .option:hover {
            background: rgba(106, 0, 255, 0.2);
        }
        
        .btn-row {
            display: flex;
            gap: 12px;
            margin-top: 10px;
        }
        
        .btn {
            flex: 1;
            padding: 14px;
            border-radius: 50px;
            text-align: center;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 100;
            text-align: center;
            display: none;
        }
        
        .error-toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: #ff3366;
            color: white;
            padding: 14px 24px;
            border-radius: 50px;
            display: none;
            z-index: 4000;
            box-shadow: 0 10px 30px rgba(255, 50, 100, 0.4);
        }
        
        canvas {
            display: none;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="logo">
            <span>🎥</span>
            <span>Rehan Connect</span>
        </div>
        <div class="settings-btn" onclick="toggleSettingsModal()">⚙️</div>
    </header>

    <!-- Video Area -->
    <div class="video-wrapper">
        <video id="localVideo" autoplay playsinline muted></video>
        
        <!-- Loading -->
        <div class="loading" id="loading">
            <div style="font-size: 60px; margin-bottom: 16px; animation: spin 2s linear infinite;">📹</div>
            <div style="color: var(--primary); font-size: 18px;">Starting camera...</div>
        </div>
        
        <!-- Overlay -->
        <div class="overlay">
            <div class="top-info">
                <div class="status">
                    <span class="live-dot"></span>
                    <span id="statusText">LIVE • Camera Connected</span>
                </div>
                <div onclick="toggleFullscreen()" style="background: rgba(0,0,0,0.5); padding: 8px 16px; border-radius: 50px; font-size: 14px; cursor: pointer;">
                    ⛶
                </div>
            </div>
        </div>
    </div>

    <!-- Bottom Controls -->
    <div class="bottom-bar">
        <div class="ctrl-btn" id="micBtn" onclick="toggleMic()">🎤</div>
        <div class="ctrl-btn" id="camBtn" onclick="toggleCamera()">📷</div>
        <div class="ctrl-btn" id="flipBtn" onclick="flipCamera()">🔄</div>
        <div class="ctrl-btn" onclick="capturePhoto()">📸</div>
        <div class="ctrl-btn" id="recordBtn" onclick="toggleRecording()">🎥</div>
        <div class="ctrl-btn danger" onclick="endSession()">✕</div>
    </div>

    <!-- Settings Modal -->
    <div class="modal" id="settingsModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 style="font-size: 22px;">Settings</h2>
                <div onclick="toggleSettingsModal()" style="font-size: 28px; cursor: pointer; width: 40px; text-align: center;">×</div>
            </div>
            <div class="modal-body">
                <div class="option" onclick="toggleCameraFromSettings()">
                    <span>📷 Camera</span>
                    <span id="camStatus">ON</span>
                </div>
                <div class="option" onclick="toggleMicFromSettings()">
                    <span>🎤 Microphone</span>
                    <span id="micStatus">ON</span>
                </div>
                <div class="option" onclick="toggleSpeaker()">
                    <span>🔊 Speaker</span>
                    <span id="speakerStatus">ON</span>
                </div>
                <div class="option" onclick="flipCamera()">
                    <span>🔄 Switch Camera</span>
                    <span>Front/Back</span>
                </div>
                
                <div class="option">
                    <span>📹 Quality</span>
                    <select id="qualitySelect" onchange="changeQuality()" style="background: transparent; color: white; border: none; font-size: 16px;">
                        <option value="720">720p</option>
                        <option value="1080">1080p</option>
                        <option value="360">360p</option>
                    </select>
                </div>
                
                <div class="option" onclick="toggleFullscreen()">
                    <span>⛶ Fullscreen</span>
                </div>
                
                <div class="option" onclick="showToast('Theme color picker coming soon')">
                    <span>🌈 Theme Color</span>
                </div>
                
                <div class="option" onclick="showToast('Language settings coming soon')">
                    <span>🌐 Language</span>
                </div>
                
                <div onclick="resetSettings()" class="option" style="margin-top: 20px; background: rgba(255,80,80,0.15);">
                    <span>Reset All Settings</span>
                </div>
                
                <div onclick="showToast('Rehan Connect v1.0\nModern Random Video Chat')" class="option">
                    <span>About Rehan Connect</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Error Toast -->
    <div class="error-toast" id="errorToast"></div>

    <canvas id="photoCanvas" width="1280" height="720"></canvas>

    <script>
        // DOM Elements
        const video = document.getElementById('localVideo');
        const loading = document.getElementById('loading');
        const settingsModal = document.getElementById('settingsModal');
        const errorToast = document.getElementById('errorToast');
        const micBtn = document.getElementById('micBtn');
        const camBtn = document.getElementById('camBtn');
        const recordBtn = document.getElementById('recordBtn');
        const statusText = document.getElementById('statusText');
        
        // State
        let stream = null;
        let currentFacingMode = 'user';
        let isMicEnabled = true;
        let isCamEnabled = true;
        let isRecording = false;
        let mediaRecorder = null;
        let recordedChunks = [];
        let photoCanvas = document.getElementById('photoCanvas');
        let photoCtx = photoCanvas.getContext('2d');
        let currentQuality = { width: 1280, height: 720 };
        
        // Show toast
        function showToast(message, duration = 2500) {
            errorToast.textContent = message;
            errorToast.style.display = 'block';
            setTimeout(() => {
                errorToast.style.display = 'none';
            }, duration);
        }
        
        // Initialize camera
        async function initCamera(facingMode = 'user') {
            loading.style.display = 'block';
            try {
                if (stream) {
                    stream.getTracks().forEach(track => track.stop());
                }
                
                const constraints = {
                    video: {
                        facingMode: facingMode,
                        width: { ideal: currentQuality.width },
                        height: { ideal: currentQuality.height }
                    },
                    audio: true
                };
                
                stream = await navigator.mediaDevices.getUserMedia(constraints);
                
                video.srcObject = stream;
                await video.play();
                
                currentFacingMode = facingMode;
                loading.style.display = 'none';
                
                // Mirror front camera
                video.style.transform = facingMode === 'user' ? 'scaleX(-1)' : 'scaleX(1)';
                
                showToast('Camera started successfully', 1500);
                
            } catch (err) {
                loading.style.display = 'none';
                console.error(err);
                showToast('Camera permission denied or unavailable. Please allow access.', 4000);
            }
        }
        
        function toggleMic() {
            if (!stream) return;
            isMicEnabled = !isMicEnabled;
            stream.getAudioTracks().forEach(track => {
                track.enabled = isMicEnabled;
            });
            micBtn.textContent = isMicEnabled ? '🎤' : '🔇';
            micBtn.classList.toggle('muted', !isMicEnabled);
        }
        
        function toggleCamera() {
            if (!stream) return;
            isCamEnabled = !isCamEnabled;
            stream.getVideoTracks().forEach(track => {
                track.enabled = isCamEnabled;
            });
            camBtn.textContent = isCamEnabled ? '📷' : '🚫';
            showToast(isCamEnabled ? 'Camera ON' : 'Camera OFF');
        }
        
        async function flipCamera() {
            const newMode = currentFacingMode === 'user' ? 'environment' : 'user';
            await initCamera(newMode);
        }
        
        function capturePhoto() {
            if (!stream || !isCamEnabled) {
                showToast('Camera is off');
                return;
            }
            photoCanvas.width = video.videoWidth;
            photoCanvas.height = video.videoHeight;
            photoCtx.drawImage(video, 0, 0, photoCanvas.width, photoCanvas.height);
            
            const link = document.createElement('a');
            link.download = `rehan-connect-${new Date().toISOString().slice(0,19).replace(/:/g,'-')}.png`;
            link.href = photoCanvas.toDataURL('image/png');
            link.click();
            showToast('Photo saved!');
        }
        
        function toggleRecording() {
            if (!stream) return;
            
            if (!isRecording) {
                // Start recording
                recordedChunks = [];
                mediaRecorder = new MediaRecorder(stream);
                
                mediaRecorder.ondataavailable = (e) => {
                    if (e.data.size > 0) recordedChunks.push(e.data);
                };
                
                mediaRecorder.onstop = () => {
                    const blob = new Blob(recordedChunks, { type: 'video/mp4' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `rehan-connect-recording-${Date.now()}.mp4`;
                    a.click();
                    URL.revokeObjectURL(url);
                };
                
                mediaRecorder.start();
                isRecording = true;
                recordBtn.style.background = '#ff0033';
                recordBtn.style.borderColor = '#ff6666';
                showToast('Recording started...');
            } else {
                // Stop recording
                mediaRecorder.stop();
                isRecording = false;
                recordBtn.style.background = '';
                recordBtn.style.borderColor = '';
                showToast('Recording saved!');
            }
        }
        
        function endSession() {
            if (confirm('End current session and return to home?')) {
                if (stream) {
                    stream.getTracks().forEach(track => track.stop());
                }
                window.location.href = 'index.html'; // or reload for demo
            }
        }
        
        // Settings Modal
        function toggleSettingsModal() {
            if (settingsModal.style.display === 'flex') {
                settingsModal.style.display = 'none';
            } else {
                settingsModal.style.display = 'flex';
            }
        }
        
        function toggleCameraFromSettings() {
            toggleCamera();
            document.getElementById('camStatus').textContent = isCamEnabled ? 'ON' : 'OFF';
            toggleSettingsModal();
        }
        
        function toggleMicFromSettings() {
            toggleMic();
            document.getElementById('micStatus').textContent = isMicEnabled ? 'ON' : 'OFF';
            toggleSettingsModal();
        }
        
        function toggleSpeaker() {
            video.muted = !video.muted;
            document.getElementById('speakerStatus').textContent = video.muted ? 'OFF' : 'ON';
            showToast(video.muted ? 'Speaker muted' : 'Speaker enabled');
            toggleSettingsModal();
        }
        
        function changeQuality() {
            const q = parseInt(document.getElementById('qualitySelect').value);
            if (q === 1080) currentQuality = { width: 1920, height: 1080 };
            else if (q === 720) currentQuality = { width: 1280, height: 720 };
            else currentQuality = { width: 640, height: 360 };
            
            showToast(`Quality changed to ${q}p`);
            initCamera(currentFacingMode);
            toggleSettingsModal();
        }
        
        function resetSettings() {
            if (confirm('Reset all settings to default?')) {
                showToast('Settings reset');
                toggleSettingsModal();
            }
        }
        
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(() => {});
            } else {
                document.exitFullscreen();
            }
            toggleSettingsModal();
        }
        
        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && settingsModal.style.display === 'flex') {
                settingsModal.style.display = 'none';
            }
            if (e.key === 'p' || e.key === 'P') capturePhoto();
            if (e.key === 'r' || e.key === 'R') toggleRecording();
        });
        
        // Touch feedback
        function addTouchFeedback() {
            const buttons = document.querySelectorAll('.ctrl-btn');
            buttons.forEach(btn => {
                btn.addEventListener('touchstart', () => {
                    btn.style.transform = 'scale(0.85)';
                });
                btn.addEventListener('touchend', () => {
                    btn.style.transform = '';
                });
            });
        }
        
        // Initialize everything
        async function initialize() {
            console.log('%cRehan Connect initialized successfully', 'color:#9b00ff;font-size:15px;font-weight:600');
            
            addTouchFeedback();
            
            // Auto start camera
            setTimeout(() => {
                initCamera('user');
            }, 300);
            
            // Demo live status
            setInterval(() => {
                if (Math.random() > 0.7) {
                    statusText.textContent = "LIVE • Connected";
                }
            }, 8000);
            
            // Prevent pull-to-refresh
            document.body.style.overscrollBehavior = 'none';
        }
        
        // Expose functions to window
        window.toggleSettingsModal = toggleSettingsModal;
        window.toggleMic = toggleMic;
        window.toggleCamera = toggleCamera;
        window.flipCamera = flipCamera;
        window.capturePhoto = capturePhoto;
        window.toggleRecording = toggleRecording;
        window.endSession = endSession;
        window.toggleCameraFromSettings = toggleCameraFromSettings;
        window.toggleMicFromSettings = toggleMicFromSettings;
        window.toggleSpeaker = toggleSpeaker;
        window.changeQuality = changeQuality;
        window.resetSettings = resetSettings;
        window.toggleFullscreen = toggleFullscreen;
        window.showToast = showToast;
        
        // Boot the app
        window.onload = initialize;
    </script>
</body>
    </html>
