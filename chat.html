<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rehan Connect Chat</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0d0d0d;
color:white;
display:flex;
flex-direction:column;
height:100vh;
}

header{
background:linear-gradient(90deg,#6a00ff,#9b00ff);
padding:18px;
text-align:center;
font-size:26px;
font-weight:bold;
box-shadow:0 0 15px #7d00ff;
}

.online{
text-align:center;
padding:10px;
color:#00ff88;
font-weight:bold;
}

.chatBox{
flex:1;
padding:15px;
overflow-y:auto;
}

.message{
background:#1f1f1f;
padding:12px;
border-radius:12px;
margin-bottom:12px;
max-width:80%;
}

.me{
margin-left:auto;
background:#7d00ff;
}

.inputArea{
display:flex;
padding:10px;
background:#161616;
gap:10px;
}
input{
flex:1;
padding:14px;
border:none;
border-radius:12px;
font-size:16px;
outline:none;
}

button{
padding:14px 18px;
border:none;
border-radius:12px;
background:#7d00ff;
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

button:active{
transform:scale(.96);
}

</style>
</head>

<body>

<header>💬 Rehan Connect Chat</header>

<div class="online">
🟢 1,284 users online
</div>

<div class="chatBox" id="chatBox">

<div class="message">
👋 Welcome to Rehan Connect!
</div>

<div class="message me">
Hi everyone! 😊
</div>

</div>

<div class="inputArea">

<input
type="text"
id="msg"
placeholder="Type a message...">

<button id="sendBtn">
📤
</button>

</div>
<script>

const sendBtn = document.getElementById("sendBtn");
const msg = document.getElementById("msg");
const chatBox = document.getElementById("chatBox");

sendBtn.onclick = function(){

if(msg.value.trim() === "") return;

const div = document.createElement("div");

div.className = "message me";

div.textContent = msg.value;

chatBox.appendChild(div);

chatBox.scrollTop = chatBox.scrollHeight;

msg.value = "";

};

msg.addEventListener("keypress",function(e){

if(e.key==="Enter"){

sendBtn.click();

}

});

                                        </script>
                                        </body>
</html>
